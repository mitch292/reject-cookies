name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Generate checksums
        run: |
          cd dist
          find . -type f -not -name '*.map' | sort | xargs sha256sum > ../checksums.txt
          cd ..
          echo "--- checksums.txt ---"
          cat checksums.txt

      - name: Create zip
        run: cd dist && zip -r ../reject-cookies.zip . -x '*.map'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            reject-cookies.zip
            checksums.txt
          generate_release_notes: true
